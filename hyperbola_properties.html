<div style="position: relative; width: 100%; height: 340px;">
<canvas id="hyp" role="img" aria-label="Гипербола y равно k делить на x. Кривая приближается к осям как к асимптотам, но не касается их. Произведение координат в любой точке постоянно.">График функции y=k/x — гипербола. Ветвь в первом квадранте приближается к обеим осям, но никогда их не касается.</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const k = 100;
const curve = [];
for (let x = 1.5; x <= 70; x += 0.5) {
  curve.push({x: x, y: k / x});
}
const pts = [
  {x: 2, y: 50}, {x: 10, y: 10}, {x: 50, y: 2}
];
new Chart(document.getElementById('hyp'), {
  type: 'scatter',
  data: {
    datasets: [
      { label: 'y=k/x', data: curve, showLine: true, borderColor: '#534AB7', borderWidth: 2.5, pointRadius: 0, tension: 0.3 },
      { label: 'точки', data: pts, backgroundColor: '#D85A30', pointRadius: 6 }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: c => `x=${c.raw.x}, y=${c.raw.y} → x·y=${c.raw.x*c.raw.y}` } }
    },
    scales: {
      x: { title: { display: true, text: 'x (токен A)' }, min: 0, max: 70, grid: { color: 'rgba(128,128,128,0.1)' } },
      y: { title: { display: true, text: 'y (токен B)' }, min: 0, max: 60, grid: { color: 'rgba(128,128,128,0.1)' } }
    }
  }
});
</script>
