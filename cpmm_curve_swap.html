<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 8px; font-size: 12px; color: var(--color-text-secondary);">
<span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #534AB7;"></span>Кривая x·y=k</span>
<span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 50%; background: #1D9E75;"></span>До свопа (100 ETH, $2000)</span>
<span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 50%; background: #D85A30;"></span>После свопа (95.24 ETH, $2205)</span>
</div>
<div style="position: relative; width: 100%; height: 320px;">
<canvas id="cpmm" role="img" aria-label="Гипербола x умножить на y равно k. Точка до свопа: 100 ETH. После покупки ETH точка съезжает по кривой: ETH меньше, цена выше.">Кривая постоянного произведения: при покупке ETH из пула его количество падает, а цена растёт по гиперболе.</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const k = 20000000;
const curve = [];
for (let x = 60; x <= 160; x += 2) {
  curve.push({x: x, y: k / x});
}
new Chart(document.getElementById('cpmm'), {
  type: 'scatter',
  data: {
    datasets: [
      { label: 'x·y=k', data: curve, showLine: true, borderColor: '#534AB7', borderWidth: 2, pointRadius: 0, tension: 0.3 },
      { label: 'До', data: [{x:100, y:200000}], backgroundColor: '#1D9E75', pointRadius: 7 },
      { label: 'После', data: [{x:95.24, y:210000}], backgroundColor: '#D85A30', pointRadius: 7 }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { title: { display: true, text: 'ETH в пуле' }, min: 60, max: 160 },
      y: { title: { display: true, text: 'USDC в пуле' }, min: 120000, max: 340000, ticks: { callback: v => '$' + (v/1000) + 'k' } }
    }
  }
});
</script>
